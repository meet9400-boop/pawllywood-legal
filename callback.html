<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pawllywood Uploader — OAuth callback</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:640px;margin:60px auto;padding:0 20px;line-height:1.6;text-align:center}
  code{background:#f4f4f4;padding:2px 6px;border-radius:4px;word-break:break-all}
  .box{background:#f8f8f8;border:1px solid #ddd;border-radius:8px;padding:16px;margin-top:20px}
</style>
</head>
<body>
<h2>로그인 처리 중…</h2>
<p>자동으로 프로그램에 코드를 전달합니다. 이 창은 잠시 후 닫아도 됩니다.</p>
<div class="box">
  <p>자동 전달이 안 되면 아래 전체 주소를 복사해 터미널에 붙여넣으세요:</p>
  <code id="full"></code>
</div>
<script>
  // TikTok이 여기(HTTPS, 우리 도메인)로 code를 붙여 리다이렉트 →
  // 로컬 프로그램(auth.js)이 듣고 있는 localhost로 top-level 이동시켜 전달.
  // https→http://localhost 는 top-level 내비게이션이라 브라우저가 허용(mixed-content 대상 아님).
  var qs = window.location.search || '';
  var target = 'http://localhost:4477/callback/tiktok' + qs;
  document.getElementById('full').textContent = target;
  // 짧은 지연 후 이동(사용자가 화면을 인지)
  setTimeout(function(){ window.location.replace(target); }, 800);
</script>
</body>
</html>
